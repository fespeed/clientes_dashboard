<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Gestão de Clientes - Dashboard Interno</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="dashboard">
    <!-- Área superior com operador (SessionStorage) -->
    <div class="header-bar">
        <div class="titulo-principal">
            <h1>📋 Gestão de Clientes · Dashboard</h1>
        </div>
        <div class="operador-card" id="operadorDisplay">
            <span>👤 Operador(a) atual:</span>
            <span id="operadorNomeSpan">---</span>
        </div>
    </div>

    <div class="painel-grid">
        <!-- Painel de Cadastro (formulário) -->
        <div class="form-card">
            <h2>➕ Novo Cliente</h2>
            <form id="clienteForm">
                <div class="campo">
                    <label>Nome completo *</label>
                    <input type="text" id="nomeCliente" placeholder="Ex: Ana Maria Souza" autocomplete="off" required>
                </div>
                <div class="campo">
                    <label>E-mail *</label>
                    <input type="email" id="emailCliente" placeholder="cliente@exemplo.com" autocomplete="off" required>
                    <small class="email-hint">⚠️ E-mail inválido fica vermelho ao perder foco</small>
                </div>
                <div class="campo">
                    <label>Tipo de Plano *</label>
                    <select id="planoCliente">
                        <option value="Gold">✨ Gold</option>
                        <option value="Silver">⚪ Silver</option>
                        <option value="Bronze">🟤 Bronze</option>
                    </select>
                </div>
                <button type="submit" class="botao-salvar">💾 Salvar Cliente</button>
            </form>
        </div>

        <!-- Painel direito: Filtro + Cards dinâmicos -->
        <div class="lista-cards">
            <div class="filtro-card">
                <h2>🔍 Buscar cliente</h2>
                <div class="busca-wrapper">
                    <input type="text" id="filtroBusca" placeholder="Digite nome, e-mail ou plano..." autocomplete="off">
                </div>
            </div>
            <div class="clientes-section">
                <h2>📇 Clientes cadastrados</h2>
                <div id="cardsContainer" class="cards-container">
                    <!-- Os cards serão inseridos dinamicamente -->
                    <div class="sem-clientes-msg">Nenhum cliente cadastrado. Adicione um cliente!</div>
                </div>
            </div>
        </div>
    </div>
    <footer>✅ Dados salvos no LocalStorage · Operador salvo apenas na sessão atual</footer>
</div>

<script src="script.js"></script>
</body>
</html>
